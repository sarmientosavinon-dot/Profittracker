<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DariVapos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #050505, #111111);
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 215, 0, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.08);
      transition: 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
    }

    .gold {
      color: #FFD700;
    }

    .fade-in {
      animation: fade 0.4s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-black gold">💨 DarioVapos</h1>
        <p class="text-yellow-200">Sistema premium de inventario y profit</p>
      </div>

      <button onclick="resetData()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl font-bold">
        Reset
      </button>
    </div>

    <!-- STATS -->
    <div class="grid md:grid-cols-4 gap-4 mb-8">

      <div class="glass rounded-3xl p-5">
        <p class="text-gray-400">Profit Total</p>
        <h2 id="profitTotal" class="text-3xl font-bold text-green-400">$0</h2>
      </div>

      <div class="glass rounded-3xl p-5">
        <p class="text-gray-400">Invertido</p>
        <h2 id="investedTotal" class="text-3xl font-bold text-yellow-400">$0</h2>
      </div>

      <div class="glass rounded-3xl p-5">
        <p class="text-gray-400">Capital Total</p>
        <h2 id="capitalTotal" class="text-3xl font-bold text-cyan-400">$0</h2>
      </div>

      <div class="glass rounded-3xl p-5">
        <p class="text-gray-400">Productos</p>
        <h2 id="productCount" class="text-3xl font-bold">0</h2>
      </div>

    </div>

    <!-- FORM -->
    <div class="glass rounded-3xl p-6 mb-8">
      <h2 class="text-2xl font-bold mb-4">➕ Agregar Vape</h2>

      <div class="grid md:grid-cols-5 gap-4">

        <input id="name" type="text" placeholder="Modelo"
          class="bg-black/40 border border-white/10 rounded-xl p-3 outline-none">

        <input id="flavor" type="text" placeholder="Sabor"
          class="bg-black/40 border border-white/10 rounded-xl p-3 outline-none">

        <input id="cost" type="number" placeholder="Precio mayoreo"
          class="bg-black/40 border border-white/10 rounded-xl p-3 outline-none">

        <input id="price" type="number" placeholder="Precio venta"
          class="bg-black/40 border border-white/10 rounded-xl p-3 outline-none">

        <input id="stock" type="number" placeholder="Stock"
          class="bg-black/40 border border-white/10 rounded-xl p-3 outline-none">

      </div>

      <button onclick="addProduct()"
        class="mt-5 bg-green-500 hover:bg-green-600 px-6 py-3 rounded-2xl font-bold w-full">
        Guardar Producto
      </button>
    </div>

    <!-- PRODUCTS -->
    <div>
      <h2 class="text-2xl font-bold mb-4">📦 Inventario</h2>

      <div id="productsGrid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

      <div class="glass rounded-3xl p-6 mt-10 fade-in">
        <h2 class="text-2xl font-bold gold mb-5">🛒 Historial de Ventas</h2>

        <div id="salesHistory" class="space-y-3 text-sm"></div>
      </div>
    </div>

  </div>

  <script>

    let products = JSON.parse(localStorage.getItem('vapeProducts')) || [];
    let sales = JSON.parse(localStorage.getItem('vapeSales')) || [];

    function saveData() {
      localStorage.setItem('vapeProducts', JSON.stringify(products));
      localStorage.setItem('vapeSales', JSON.stringify(sales));
    }

    function money(value) {
      return '$' + Number(value).toLocaleString('es-MX');
    }

    function addProduct() {

      const name = document.getElementById('name').value;
      const flavor = document.getElementById('flavor').value;
      const cost = Number(document.getElementById('cost').value);
      const price = Number(document.getElementById('price').value);
      const stock = Number(document.getElementById('stock').value);

      if (!name || !flavor || !cost || !price || !stock) {
        alert('Completa todos los campos');
        return;
      }

      const product = {
        id: Date.now(),
        name,
        flavor,
        cost,
        price,
        stock,
        sold: 0
      };

      products.push(product);

      saveData();
      function renderSales() {

      const container = document.getElementById('salesHistory');

      if (!container) {
        return;
      }

      container.innerHTML = '';

      if (sales.length === 0) {
        container.innerHTML = '<p class="text-gray-400">No hay ventas todavía</p>';
        return;
      }

      for (let i = 0; i < sales.length; i++) {

        const sale = sales[i];

        const item = document.createElement('div');

        item.className = 'bg-black/40 border border-yellow-500/10 rounded-2xl p-4 fade-in';

        item.innerHTML = `
          <p class="font-bold gold">${sale.product}</p>
          <p>${sale.flavor}</p>
          <p class="text-green-400">Cliente: ${sale.customer}</p>
          <p class="text-gray-400 text-xs">${sale.date}</p>
        `;

        container.appendChild(item);
      }
    }

    renderProducts();
    renderSales();

      document.getElementById('name').value = '';
      document.getElementById('flavor').value = '';
      document.getElementById('cost').value = '';
      document.getElementById('price').value = '';
      document.getElementById('stock').value = '';
    }

    function renderProducts() {

      const grid = document.getElementById('productsGrid');

      grid.innerHTML = '';

      let totalProfit = 0;
      let totalInvested = 0;

      products.forEach(product => {

        const profitPerUnit = product.price - product.cost;
        const productProfit = profitPerUnit * product.sold;
        const invested = product.cost * product.sold;

        totalProfit += productProfit;
        totalInvested += invested;

        const card = document.createElement('div');

        card.className = 'glass rounded-3xl p-5 fade-in';

        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-2xl font-bold">${product.name}</h3>
              <p class="text-gray-400">${product.flavor}</p>
            </div>

            <button onclick="deleteProduct(${product.id})"
              class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded-lg text-sm">
              Eliminar
            </button>
          </div>

          <div class="space-y-2 mb-5">
            <p>💵 Mayoreo: <span class="font-bold">${money(product.cost)}</span></p>
            <p>🏷️ Venta: <span class="font-bold">${money(product.price)}</span></p>
            <p>📈 Profit unidad: <span class="text-green-400 font-bold">${money(profitPerUnit)}</span></p>
            <p>📦 Stock: <span class="font-bold">${product.stock}</span></p>
            <p>🛒 Vendidos: <span class="font-bold">${product.sold}</span></p>
            <p>💰 Profit generado: <span class="text-green-400 font-bold">${money(productProfit)}</span></p>
          </div>

          <div class="flex gap-3">

            <button onclick="sellProduct(${product.id}, event)"
              class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-xl flex-1 font-bold">
              Vender
            </button>

            <button onclick="restockProduct(${product.id})"
              class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-xl flex-1 font-bold">
              Restock
            </button>

          </div>
        `;

        grid.appendChild(card);
      });

      document.getElementById('profitTotal').innerText = money(totalProfit);
      document.getElementById('investedTotal').innerText = money(totalInvested);
      document.getElementById('capitalTotal').innerText = money(totalInvested + totalProfit);
      document.getElementById('productCount').innerText = products.length;
    }

    function sellProduct(id, event) {

      const productIndex = products.findIndex(p => p.id === id);

      if (productIndex === -1) {
        alert('Producto no encontrado');
        return;
      }

      const product = products[productIndex];

      if (product.stock <= 0) {
        alert('No hay stock disponible');
        return;
      }

      const customer = prompt('¿A quién se le vendió?');

      if (!customer || customer.trim() === '') {
        alert('Debes escribir un nombre');
        return;
      }

      products[productIndex].stock = Number(products[productIndex].stock) - 1;
      products[productIndex].sold = Number(products[productIndex].sold) + 1;

      const sale = {
        id: Date.now(),
        product: product.name,
        flavor: product.flavor,
        customer: customer.trim(),
        date: new Date().toLocaleString('es-MX')
      };

      sales.unshift(sale);

      saveData();

      const salesContainer = document.getElementById('salesHistory');

      if (salesContainer) {
        salesContainer.innerHTML = '';
      }

      renderProducts();
      renderSales();

      const button = event.target;

      if (button) {
        button.innerText = '✅ Vendido';

        setTimeout(() => {
          button.innerText = 'Vender';
        }, 1200);
      }
    }

    function restockProduct(id) {

      const amount = prompt('¿Cuántas unidades agregarás?');

      if (!amount) return;

      const product = products.find(p => p.id === id);

      product.stock += Number(amount);

      saveData();
      renderProducts();
    }

    function deleteProduct(id) {

      const confirmed = confirm('¿Eliminar producto?');

      if (!confirmed) {
        return;
      }

      const updatedProducts = [];

      for (let i = 0; i < products.length; i++) {
        if (products[i].id !== id) {
          updatedProducts.push(products[i]);
        }
      }

      products = updatedProducts;

      localStorage.setItem('vapeProducts', JSON.stringify(products));

      renderProducts();

      alert('Producto eliminado correctamente');
    }

    function resetData() {

      if (!confirm('Esto borrará TODO')) return;

      localStorage.removeItem('vapeProducts');
      localStorage.removeItem('vapeSales');

      products = [];
      sales = [];

      renderProducts();
      renderSales();
    }

    renderProducts();

  </script>

</body>
</html>
